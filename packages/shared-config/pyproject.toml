[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "shared-config"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10.0",
  "pydantic-settings>=2.7.0",
  "sqlalchemy>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/shared_config"]
